# ~/.config/starship.toml
# Doc : https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

# ─────────────────────────────────────────────────────────────
# Directory
# ─────────────────────────────────────────────────────────────
[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true

# ─────────────────────────────────────────────────────────────
# Git
# ─────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

# ─────────────────────────────────────────────────────────────
# Python — affiché seulement quand un projet Python est détecté
# ─────────────────────────────────────────────────────────────
[python]
symbol = "🐍 "
detect_files = [
  ".python-version",
  "pyproject.toml",
  "requirements.txt",
  "setup.py",
  "Pipfile",
  "uv.lock",
]
detect_folders = [".venv", "venv"]
style = "bold yellow"

# ─────────────────────────────────────────────────────────────
# Node — affiché seulement si package.json / .nvmrc présent
# ─────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
detect_files = ["package.json", ".nvmrc"]
style = "bold green"

# ─────────────────────────────────────────────────────────────
# Durée de commande — affichée si > 2s
# ─────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "[$duration](bold yellow) "

# ─────────────────────────────────────────────────────────────
# Caractère de prompt
# ─────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
